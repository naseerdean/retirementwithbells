<div class="rpanel">
    <div class="rpanel-hd">
      <span class="rpanel-title">Year-by-Year Breakdown (Blended Strategy)</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th class="L">Age</th>
            <th>Target Spend</th>
            <th>Ext. Income</th>
            <th>Pension Dr.</th>
            <th>ISA/GIA/Bond</th>
            <th>Tax Paid</th>
            <th>Portfolio End</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ... (Your existing g, ff, ffz, fmt functions) ...

function calculate() {
    var p = {
        pension: g('pension'), isa: g('isa'), gia: g('gia'), pcls: g('pcls'),
        ob: g('ob'), obg: g('obg'), obYrs: g('obYrs'),
        sa: g('sa'), ty: g('ty'), ca: g('ca'),
        sp1: g('sp1'), sp2: g('sp2'), t1: g('t1'), t2: g('t2'), cg: g('cg'),
        spAmt: g('spAmt'), spAge: g('spAge'), spIdx: g('spIdx'),
        rental: g('rental'), rentalAge: g('rentalAge'), rentalEnd: g('rentalEnd'), rentalIdx: g('rentalIdx'),
        trust: g('trust'), trustAge: g('trustAge'), trustEnd: g('trustEnd'), trustIdx: g('trustIdx'),
        i1: g('i1'), i2: g('i2'), pg: g('pg'), ig: g('ig'), gg: g('gg'), fees: g('fees')
    };

    var pf = runStrategy(p, 'pension'), if_ = runStrategy(p, 'isa'), ob_ = runStrategy(p, 'offshore'), bl = runStrategy(p, 'blended');
    
    // Update the Results UI (Banner and KPI Cards logic as you had it)
    document.getElementById('results').innerHTML = generateResultsHTML(p, pf, if_, ob_, bl);

    // Render Charts
    drawLine('lineChart', bl.rows.map((r, i) => ({
        age: r.age,
        'Pension First': pf.rows[i].total,
        'ISA First': if_.rows[i].total,
        'Offshore First': ob_.rows[i].total,
        'Blended': r.total
    })), ['Pension First', 'ISA First', 'Offshore First', 'Blended'], ['#C0392B', '#2A7070', '#C47820', '#3A6B5A']);

    drawBar('barChart', bl.rows, ['fp', 'fi', 'fg', 'fob', 'spN', 'rentalG', 'trustG'], 
           ['#6B4580', '#2A7070', '#3A6B5A', '#C47820', '#B8922A', '#A04040', '#6B4580']);

    // Fill Table
    const tbody = document.getElementById('tableBody');
    bl.rows.forEach(r => {
        const tr = document.createElement('tr');
        if(r.depleted) tr.className = 'depl-row';
        tr.innerHTML = `
            <td class="L">Age ${r.age}</td>
            <td>${ff(r.tns)}</td>
            <td>${ff(r.extIncome)}</td>
            <td>${ff(r.fp)}</td>
            <td>${ff(r.fi + r.fg + r.fob)}</td>
            <td style="color:var(--err)">${ff(r.taxP)}</td>
            <td style="font-weight:600">${ff(r.total)}</td>
        `;
        tbody.appendChild(tr);
    });
}
// ... (Add your drawLine and drawBar functions here) ...
</script>
